<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1987" height="800" style="width: 1987px; height: 800px; background: #ffffff" viewBox="0 0 1987 800"><style id="v-3" type="text/css">        .joint-element .scalable * {            vector-effect: non-scaling-stroke;        }    </style><defs joint-selector="defs"><marker id="v-21252848929" orient="auto" overflow="visible" markerUnits="userSpaceOnUse"><path id="v-112" stroke="#444444" fill="#444444" transform="rotate(180)" d="M 20 -10 0 0 20 10 Z"></path></marker></defs><g joint-selector="layers"  transform="matrix(1,0,0,1,0,0)"><g  style="pointer-events: none;"></g><g ></g><g  style="user-select: none;"><!--z-index:0--><!--z-index:1--><!--z-index:2--><!--z-index:3--><!--z-index:4--><!--z-index:5--><!--z-index:6--><g   id="j_27"  transform="translate(20,756)"><g id="v-312"><text  id="v-313" font-size="24px" xml:space="preserve" y="0.8em" font-weight="normal" text-anchor="start" fill="#444444" pointer-events="none" display="block" font-family="Tahoma, Verdana, Helvetica, Arial"><tspan dy="0" >Tuesday, March 24, 2026 at 2:16 AM Eastern Daylight Time</tspan></text></g></g><!--z-index:7--><g   id="j_26"  transform="translate(20,722)"><g id="v-310"><text  id="v-311" font-size="24px" xml:space="preserve" y="0.8em" font-weight="normal" text-anchor="start" fill="#444444" pointer-events="none" display="block" font-family="Tahoma, Verdana, Helvetica, Arial"><tspan dy="0" >The application client calls the store using the standard S3 API. Internally the store routes, sequences, and durably shards every object.</tspan></text></g></g><!--z-index:8--><g   id="j_25"  transform="translate(20,676)"><g id="v-308"><text  id="v-309" font-size="36px" xml:space="preserve" y="0.8em" font-weight="normal" text-anchor="start" fill="#444444" pointer-events="none" display="block" font-family="Tahoma, Verdana, Helvetica, Arial"><tspan dy="0" >Level 1 – System Context: Distributed Object Store</tspan></text></g></g><!--z-index:9--><g   id="j_28"  transform="translate(398,142)" style=""><g  id="v-320" style="opacity: 1;"><rect  x="0" y="160" width="400" height="240" rx="70" id="v-322" stroke-width="2" pointer-events="visiblePainted" fill="#1168bd" stroke="#0f5eaa" stroke-dasharray="" style="fill: rgb(17, 104, 189); stroke: rgb(15, 94, 170);"></rect><circle  cx="200" cy="88.88888888888889" r="88.88888888888889" id="v-321" stroke-width="2" pointer-events="visiblePainted" fill="#1168bd" stroke="#0f5eaa" stroke-dasharray="" style="fill: rgb(17, 104, 189); stroke: rgb(15, 94, 170);"></circle><line  x1="80" y1="266.6666666666667" x2="80" y2="400" id="v-328" stroke="#0f5eaa" stroke-width="1" stroke-dasharray="" style="stroke: rgb(15, 94, 170);"></line><line  x1="320" y1="266.6666666666667" x2="320" y2="400" id="v-329" stroke="#0f5eaa" stroke-width="1" stroke-dasharray="" style="stroke: rgb(15, 94, 170);"></line><text  id="v-323" font-size="33.599999999999994px" xml:space="preserve" y="188.10000000000002" font-weight="bold" text-anchor="middle" pointer-events="visible" font-family="Tahoma, Verdana, Helvetica, Arial" fill="#ffffff" dominant-baseline="hanging" transform="matrix(1,0,0,1,200,0)" style="fill: rgb(255, 255, 255);"><tspan dy="0" >Application Client</tspan></text><text  id="v-324" font-size="16.799999999999997px" xml:space="preserve" y="229.70000000000002" text-anchor="middle" font-family="Tahoma, Verdana, Helvetica, Arial" fill="#ffffff" dominant-baseline="hanging" transform="matrix(1,0,0,1,200,0)" style="display: block; fill: rgb(255, 255, 255);"><tspan dy="0" >[Person]</tspan></text><text  id="v-325" font-size="24px" xml:space="preserve" y="261.5" text-anchor="middle" font-family="Tahoma, Verdana, Helvetica, Arial" fill="#ffffff" dominant-baseline="hanging" transform="matrix(1,0,0,1,200,0)" style="display: block; fill: rgb(255, 255, 255);"><tspan dy="0" >Any application that talks to the</tspan><tspan dy="1.2em" x="0" >store via the standard S3 HTTP</tspan><tspan dy="1.2em" x="0" >API (PUT, GET, DELETE,</tspan><tspan dy="1.2em" x="0" >multipart upload, bucket ops).</tspan></text><g  id="v-326" font-weight="normal" text-anchor="middle" color="#ffffff" transform="matrix(1,0,0,1,197.5,368)" style="fill: rgb(255, 255, 255);" display="none"><g ></g><g ></g><g ></g><g ></g></g><image  id="v-327"></image></g></g><!--z-index:10--><g   id="j_29"  transform="translate(1138,192)" style=""><g  id="v-336" style="opacity: 1;"><rect  id="v-337" rx="20" ry="20" stroke-width="2" pointer-events="visiblePainted" fill="#1168bd" stroke="#0f5eaa" stroke-dasharray="" width="450" height="300" style="fill: rgb(17, 104, 189); stroke: rgb(15, 94, 170);"></rect><text  id="v-338" font-size="33.599999999999994px" xml:space="preserve" y="43.70000000000002" font-weight="bold" text-anchor="middle" pointer-events="visible" font-family="Tahoma, Verdana, Helvetica, Arial" fill="#ffffff" dominant-baseline="hanging" transform="matrix(1,0,0,1,225,0)" style="fill: rgb(255, 255, 255);"><tspan dy="0" >Distributed Object Store</tspan></text><text  id="v-339" font-size="16.799999999999997px" xml:space="preserve" y="85.30000000000001" text-anchor="middle" font-family="Tahoma, Verdana, Helvetica, Arial" fill="#ffffff" dominant-baseline="hanging" transform="matrix(1,0,0,1,225,0)" style="display: block; fill: rgb(255, 255, 255);"><tspan dy="0" >[Software System]</tspan></text><text  id="v-340" font-size="24px" xml:space="preserve" y="117.10000000000001" text-anchor="middle" font-family="Tahoma, Verdana, Helvetica, Arial" fill="#ffffff" dominant-baseline="hanging" transform="matrix(1,0,0,1,225,0)" style="display: block; fill: rgb(255, 255, 255);"><tspan dy="0" >S3-compatible pluggable backend.</tspan><tspan dy="1.2em" x="0" >Objects are split into shards and</tspan><tspan dy="1.2em" x="0" >distributed across erasure sets so</tspan><tspan dy="1.2em" x="0" >the system can tolerate losing up to</tspan><tspan dy="1.2em" x="0" >k nodes per set.</tspan></text><g  id="v-341" color="#ffffff" transform="matrix(1,0,0,1,210,268)" style="fill: rgb(255, 255, 255);" display="none"><g  transform="translate(5 0)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zM13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"></path><path d="M10.344 11.742c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1 6.538 6.538 0 0 1-1.398 1.4z"></path><path fill-rule="evenodd" d="M6.5 3a.5.5 0 0 1 .5.5V6h2.5a.5.5 0 0 1 0 1H7v2.5a.5.5 0 0 1-1 0V7H3.5a.5.5 0 0 1 0-1H6V3.5a.5.5 0 0 1 .5-.5z"></path></svg></g><g ></g><g ></g><g ></g></g><image  id="v-342"></image></g></g><!--z-index:11--><g   id="j_30"  style="opacity: 1;"><path fill="none" cursor="pointer" stroke="transparent" stroke-linecap="round" joint-selector="wrapper" id="v-360" stroke-width="10" stroke-linejoin="round" d="M 798 295.03 L 958 257 C 964.6666666666665 255.73333333333332 971.3333333333333 255.73333333333332 978 257 L 1138 292.5" style="stroke-width: 10px;"></path><path fill="none" pointer-events="none" joint-selector="line" id="v-359" stroke="#444444" stroke-width="2" stroke-linejoin="round" stroke-dasharray="8 8" d="M 798 295.03 L 958 257 C 964.6666666666665 255.73333333333332 971.3333333333333 255.73333333333332 978 257 L 1138 292.5" marker-end="url(#v-21252848929)"></path><g id="v-349" ><g id="v-350"  label-idx="0" cursor="move" transform="matrix(1,0,0,1,968,242.64999389648438)" style="cursor: default;"><rect joint-selector="rect" id="v-354" fill="#ffffff" rx="3" ry="3" x="-76.76356506347656" y="-75.2061996459961" width="153.6980743408203" height="144.9674530029297" pointer-events="none"  style="display: block;"></rect><text joint-selector="text" id="v-353" font-size="24px" xml:space="preserve" fill="#444444" text-anchor="middle" pointer-events="none" font-family="Tahoma, Verdana, Helvetica, Arial" font-weight="normal"  style="display: block;"><tspan dy="-2.1em" >Sends S3 API</tspan><tspan dy="1.2em" x="0" >requests (PUT,</tspan><tspan dy="1.2em" x="0" >GET, DELETE,</tspan><tspan dy="1.2em" x="0" >bucket ops,</tspan><tspan dy="1.2em" x="0" >multipart)</tspan></text></g><g id="v-351"  label-idx="1" cursor="move" transform="matrix(1,0,0,1,968,330.6499938964844)" style="cursor: default;"><rect joint-selector="rect" id="v-356" fill="#ffffff" rx="3" ry="3" x="-81.06588745117188" y="-12.324341773986816" width="163.12034606933594" height="22.325580596923828"  pointer-events="none" style="display: block;"></rect><text joint-selector="text" id="v-355" font-size="16.799999999999997px" xml:space="preserve" fill="#444444" text-anchor="middle" pointer-events="none" font-family="Tahoma, Verdana, Helvetica, Arial" font-weight="normal"  style="display: block;"><tspan dy="0.3em" >[HTTPS / S3 protocol]</tspan></text></g><g id="v-352"  label-idx="2" cursor="move" transform="matrix(1,0,0,1,957.7265625,339.05072021484375)" style="cursor: default;"><rect joint-selector="rect" id="v-358" fill="#ffffff" rx="3" ry="3" x="0" y="5.684341886080802e-14" width="0" height="0"  display="none"></rect><text joint-selector="text" id="v-357" fill="#000000" font-size="14" text-anchor="middle" text-vertical-anchor="middle" pointer-events="none"></text></g></g></g><!--z-index:12--><g   id="j_31"  style="opacity: 1;"><path fill="none" cursor="pointer" stroke="transparent" stroke-linecap="round" joint-selector="wrapper" id="v-372" stroke-width="10" stroke-linejoin="round" d="M 1138 391.5 L 978 427 C 971.3333333333333 428.2666666666666 964.6666666666665 428.2666666666666 958 427 L 798 388.97" style="stroke-width: 10px;"></path><path fill="none" pointer-events="none" joint-selector="line" id="v-371" stroke="#444444" stroke-width="2" stroke-linejoin="round" stroke-dasharray="8 8" d="M 1138 391.5 L 978 427 C 971.3333333333333 428.2666666666666 964.6666666666665 428.2666666666666 958 427 L 798 388.97" marker-end="url(#v-21252848929)"></