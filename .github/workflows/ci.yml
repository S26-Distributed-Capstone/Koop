name: KoopDB CI Pipeline

# Trigger the workflow on pushes to main, or any Pull Request targeting main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Run Unit Tests
    runs-on: ubuntu-latest # The type of runner that the job will execute on

    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the Java environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Adoptium's Temurin is a solid standard
          cache: maven # Automatically caches ~/.m2 dependencies to speed up future runs

      # Step 3: Check the system's file descriptor and resource limits before we start
      - name: Check System Limits
        run: ulimit -a

      # Step 4: Run the tests and capture the exact exit code manually
      - name: Run Maven Verify
        run: |
          set +e # Prevent the shell from exiting immediately if the JVM crashes
          mvn clean verify -DargLine="-Xmx1g"
          EXIT_CODE=$?
          echo "=========================================="
          echo "MAVEN EXITED WITH CODE: $EXIT_CODE"
          echo "=========================================="
          if [ $EXIT_CODE -ne 0 ]; then exit $EXIT_CODE; fi

      # Step 5: Upload the fatal crash logs if RocksDB causes a Segmentation Fault
      - name: Upload Native JVM Crash Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-fatal-crash-logs
          path: hs_err_pid*.log