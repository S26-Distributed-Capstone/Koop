apiVersion: v1
kind: Service
metadata:
  name: query-processor
  namespace: koopdb
spec:
  selector:
    app: query-processor
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-processor
  namespace: koopdb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: query-processor
  template:
    metadata:
      labels:
        app: query-processor
    spec:
      nodeSelector:
        koopdb/role: worker
      containers:
      - name: query-processor
        image: koopdb/query-processor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: APP_PORT
          value: "8080"
        - name: ETCD_URL
          value: "http://etcd.koopdb.svc.cluster.local:2379"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.koopdb.svc.cluster.local:9092"
        # Always write to the primary pod; replicas are for durability, not read distribution
        - name: REDIS_URL
          value: "redis://redis-0.redis-headless.koopdb.svc.cluster.local:6379"
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
