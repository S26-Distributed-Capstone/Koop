# Headless service — stable pod DNS for replication config
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: koopdb
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: koopdb
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        koopdb/role: cp
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: redis
        image: redis:7-alpine
        # Pod-0 is the primary; pods 1 and 2 replicate from it.
        command:
        - /bin/sh
        - -c
        - |
          if [ "${HOSTNAME}" = "redis-0" ]; then
            exec redis-server --appendonly yes
          else
            exec redis-server --appendonly yes \
              --replicaof redis-0.redis-headless.koopdb.svc.cluster.local 6379
          fi
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
