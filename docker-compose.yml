services:
  
  # --- Storage Nodes (9 total: K=6 data + M=3 parity shards per Reed-Solomon stripe) ---
  # NOTE: 9 hardcoded nodes is a TEMPORARY constraint imposed by StorageWorker requiring
  # exactly K+M=9 addresses at construction time. Once issue #46 (MetadataClient in QP)
  # is complete, storage nodes will self-register into etcd on boot and the QP will
  # discover them dynamically — at that point these can be scaled freely with
  # "docker compose up --scale storage-node=N" and this explicit list goes away.

  storage_node_1: &storage_node_base
    build:
      context: .
      dockerfile: storage-node/Dockerfile
    environment:
      - PORT=8080
      - STORAGE_DIR=/data
      - ETCD_ENDPOINTS=etcd1:2379,etcd2:2379,etcd3:2379
    depends_on:
      - etcd1

  storage_node_2:
    <<: *storage_node_base
  storage_node_3:
    <<: *storage_node_base
  storage_node_4:
    <<: *storage_node_base
  storage_node_5:
    <<: *storage_node_base
  storage_node_6:
    <<: *storage_node_base
  storage_node_7:
    <<: *storage_node_base
  storage_node_8:
    <<: *storage_node_base
  storage_node_9:
    <<: *storage_node_base

  # --- Query Processors ---
  # NOTE: Same story — 3 replicas are explicit here because Testcontainers'
  # ComposeContainer needs individually named services to map ports dynamically.
  # Once a load balancer (issue #28) sits in front, you'd scale these freely too.  
  query_processor_1:
    build:
      context: .
      dockerfile: query-processor/Dockerfile
    ports:
      - "9001:8080"
    environment:
      - PORT=8080
      - ETCD_ENDPOINTS=etcd1:2379,etcd2:2379,etcd3:2379
    depends_on:
      - storage_node_1
      - storage_node_2
      - storage_node_3
      - storage_node_4
      - storage_node_5
      - storage_node_6
      - storage_node_7
      - storage_node_8
      - storage_node_9
      - etcd1

  query_processor_2:
    build:
      context: .
      dockerfile: query-processor/Dockerfile
    ports:
      - "9002:8080"
    environment:
      - PORT=8080
      - ETCD_ENDPOINTS=etcd1:2379,etcd2:2379,etcd3:2379
    depends_on:
      - storage_node_1
      - storage_node_2
      - storage_node_3
      - storage_node_4
      - storage_node_5
      - storage_node_6
      - storage_node_7
      - storage_node_8
      - storage_node_9
      - etcd1

  query_processor_3:
    build:
      context: .
      dockerfile: query-processor/Dockerfile
    ports:
      - "9003:8080"
    environment:
      - PORT=8080
      - ETCD_ENDPOINTS=etcd1:2379,etcd2:2379,etcd3:2379
    depends_on:
      - storage_node_1
      - storage_node_2
      - storage_node_3
      - storage_node_4
      - storage_node_5
      - storage_node_6
      - storage_node_7
      - storage_node_8
      - storage_node_9
      - etcd1

  # --- Redis ---
  # No host port mapping — only accessed internally by services via redis-master:6379.
  # Static port bindings cause startup failures in CI if the port is already in use.
  redis-master:
    image: redis:7-alpine

  # --- etcd cluster (quorum of 3) ---
  etcd1: &etcd_base
    image: quay.io/coreos/etcd:v3.5.0
    command: etcd --name etcd1 --initial-advertise-peer-urls http://etcd1:2380 --listen-peer-urls http://0.0.0.0:2380 --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd1:2379 --initial-cluster-token etcd-cluster-1 --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380 --initial-cluster-state new
  etcd2:
    <<: *etcd_base
    command: etcd --name etcd2 --initial-advertise-peer-urls http://etcd2:2380 --listen-peer-urls http://0.0.0.0:2380 --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd2:2379 --initial-cluster-token etcd-cluster-1 --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380 --initial-cluster-state new
  etcd3:
    <<: *etcd_base
    command: etcd --name etcd3 --initial-advertise-peer-urls http://etcd3:2380 --listen-peer-urls http://0.0.0.0:2380 --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd3:2379 --initial-cluster-token etcd-cluster-1 --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380 --initial-cluster-state new